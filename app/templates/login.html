<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(17, 24, 39, 0.94);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        h1 { margin: 0 0 8px 0; font-size: 28px; }
        p { margin: 0 0 22px 0; color: #cbd5e1; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #e2e8f0; }
        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #020617;
            color: #fff;
            margin-bottom: 16px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 13px 14px;
            border: 0;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .error {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.18);
            color: #fecaca;
            font-size: 13px;
        }
        .auth-footer {
            margin-top: 16px;
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
        }
        .auth-footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 700;
        }
        .hint {
            margin-top: 12px;
            color: #94a3b8;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Login</h1>
        <p>Login first to open the dashboard.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="auth-footer">
            No account? <a href="/signup">Register here</a>
        </div>

        <div class="hint">Default admin: admin@example.com / admin123</div>
    </div>
</body>
</html>
